services:
  app:
    build:
      context: ..
      dockerfile: project/Dockerfile.api
    container_name: rag-demo-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      COOKIE_SECURE: "true"
      SESSION_SECRET: ${SESSION_SECRET}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD}
      BOOTSTRAP_ADMIN_DISPLAY_NAME: ${BOOTSTRAP_ADMIN_DISPLAY_NAME}
    volumes:
      - ./apps/api/data:/app/project/apps/api/data
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
